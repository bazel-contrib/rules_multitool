name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        folder: [".", "examples/module", "examples/workspace"]
        version: ["7.x", "8.x", "9.*"]
        os: ["ubuntu-latest", "windows-latest"]
        exclude:
          - folder: "examples/workspace"
            version: "9.*"
    runs-on: ${{ matrix.os }}
    env:
      USE_BAZEL_VERSION: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          repository-cache: true
          bazelrc: common --announce_rc --color=yes --enable_workspace
      - name: Build
        working-directory: ${{ matrix.folder }}
        run: bazel build ...
      - name: Test
        working-directory: ${{ matrix.folder }}
        run: bazel test ...

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - working-directory: examples/workspace
        run: ./minimal_download_test.sh
